name: Publish

on:
  workflow_dispatch:
  release:
    types: [ created ]

jobs:
  distributions:
    name: Build distributions
    uses: ./.github/workflows/build-distributions.yml

  deploy:
    needs: distributions
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      attestations: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: distributions-*
          merge-multiple: true

      - name: Check distributions
        shell: python
        run: |
          from pathlib import Path

          distributions = sorted(Path('dist').glob('*'))
          if not distributions:
              raise SystemExit('No distributions were downloaded')

          wheels = [path for path in distributions if path.suffix == '.whl']
          sdists = [path for path in distributions if path.name.endswith('.tar.gz')]
          if not wheels:
              raise SystemExit('No wheels were downloaded')
          if not sdists:
              raise SystemExit('No source distribution was downloaded')

          for path in distributions:
              print(path)

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
