name: Build Distributions

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sdist:
    name: Source distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up CPython
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install build tooling
        run: python -m pip install -U pip build

      - name: Build sdist
        run: python -m build --sdist --outdir dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: distributions-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  linux:
    name: Linux ${{ matrix.platform.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: x86_64
            archs: x86_64
          - name: i686
            archs: i686
          - name: aarch64
            archs: aarch64
          - name: armv7l
            archs: armv7l

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_ARCHS_LINUX: ${{ matrix.platform.archs }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: distributions-linux-${{ matrix.platform.name }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  android:
    name: Android ${{ matrix.platform.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: arm64_v8a
            archs: arm64_v8a
          - name: x86_64
            archs: x86_64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_PLATFORM: android
          CIBW_ARCHS_ANDROID: ${{ matrix.platform.archs }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: distributions-android-${{ matrix.platform.name }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  windows:
    name: Windows ${{ matrix.platform.name }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: amd64
            archs: AMD64
          - name: x86
            archs: x86
          - name: arm64
            archs: ARM64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-pc-windows-msvc,aarch64-pc-windows-msvc

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_ARCHS_WINDOWS: ${{ matrix.platform.archs }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: distributions-windows-${{ matrix.platform.name }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  macos:
    name: macOS ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: x86_64
            runner: macos-15-intel
            archs: x86_64
          - name: arm64
            runner: macos-14
            archs: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_ARCHS_MACOS: ${{ matrix.platform.archs }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: distributions-macos-${{ matrix.platform.name }}
          path: wheelhouse/*.whl
          if-no-files-found: error
