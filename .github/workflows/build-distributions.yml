name: Build Distributions

on:
  push:
    paths:
      - '.github/workflows/build-distributions.yml'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'LICENSE'
      - 'MANIFEST.in'
      - 'README.md'
      - 'discord/ext/native_voice/**'
      - 'pyproject.toml'
      - 'setup.cfg'
      - 'src/**'
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sdist:
    name: Source distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up CPython
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install build tooling
        run: python -m pip install -U pip build

      - name: Build sdist
        run: python -m build --sdist --outdir dist

      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: distributions-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  linux:
    name: Linux ${{ matrix.platform.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(github.event_name == 'push' && '[{"name":"x86_64","archs":"x86_64"}]' || '[{"name":"x86_64","archs":"x86_64"},{"name":"i686","archs":"i686"},{"name":"aarch64","archs":"aarch64"},{"name":"armv7l","archs":"armv7l"}]') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        if: contains(matrix.platform.archs, 'aarch64') || contains(matrix.platform.archs, 'armv7l')
        uses: docker/setup-qemu-action@v4

      - name: Build wheels
        if: github.event_name == 'push'
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_ARCHS_LINUX: ${{ matrix.platform.archs }}
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: ""

      - name: Build wheels
        if: github.event_name != 'push'
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_ARCHS_LINUX: ${{ matrix.platform.archs }}

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: distributions-linux-${{ matrix.platform.name }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  android:
    name: Android ${{ matrix.platform.name }}
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: arm64_v8a
            archs: arm64_v8a
            rust_target: aarch64-linux-android
          - name: x86_64
            archs: x86_64
            rust_target: x86_64-linux-android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust_target }}

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_PLATFORM: android
          CIBW_ARCHS_ANDROID: ${{ matrix.platform.archs }}

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: distributions-android-${{ matrix.platform.name }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  windows:
    name: Windows ${{ matrix.platform.name }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(github.event_name == 'push' && '[{"name":"amd64","archs":"AMD64","rust_target":""}]' || '[{"name":"amd64","archs":"AMD64","rust_target":""},{"name":"x86","archs":"x86","rust_target":"i686-pc-windows-msvc"},{"name":"arm64","archs":"ARM64","rust_target":"aarch64-pc-windows-msvc"}]') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Windows Rust target
        if: matrix.platform.rust_target != ''
        run: rustup target add ${{ matrix.platform.rust_target }}

      - name: Build wheels
        if: github.event_name == 'push'
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_ARCHS_WINDOWS: ${{ matrix.platform.archs }}
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: ""

      - name: Build wheels
        if: github.event_name != 'push'
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_ARCHS_WINDOWS: ${{ matrix.platform.archs }}

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: distributions-windows-${{ matrix.platform.name }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  macos:
    name: macOS ${{ matrix.platform.name }}
    if: github.event_name != 'push'
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: x86_64
            runner: macos-15-intel
            archs: x86_64
          - name: arm64
            runner: macos-14
            archs: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_ARCHS_MACOS: ${{ matrix.platform.archs }}

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: distributions-macos-${{ matrix.platform.name }}
          path: wheelhouse/*.whl
          if-no-files-found: error
