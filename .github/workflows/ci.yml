name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install build tooling
        run: python -m pip install --upgrade pip setuptools wheel setuptools-rust

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Check Rust crate
        run: cargo check

      - name: Build Python wheel
        run: python -m pip wheel --no-deps --no-build-isolation --wheel-dir dist .

      - name: Install Python wheel
        shell: python
        run: |
          import subprocess
          import sys
          from pathlib import Path

          wheels = sorted(Path('dist').glob('discord_native_voice-*.whl'))
          if not wheels:
              raise SystemExit('Built wheel was not found')

          subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--no-deps', str(wheels[-1])])

      - name: Import native extension
        shell: python
        run: |
          import site
          import sysconfig
          from importlib import util
          from pathlib import Path

          roots = {
              Path(path)
              for path in sysconfig.get_paths().values()
              if path
          }
          roots.update(Path(path) for path in site.getsitepackages())
          usersite = site.getusersitepackages()
          if usersite:
              roots.add(Path(usersite))

          candidates = [
              path
              for root in roots
              if root.exists()
              for pattern in ('discord/ext/native_voice/_native_voice*.pyd', 'discord/ext/native_voice/_native_voice*.so')
              for path in root.glob(pattern)
          ]
          if not candidates:
              raise SystemExit('Installed native extension was not found')

          spec = util.spec_from_file_location('_native_voice', candidates[0])
          if spec is None or spec.loader is None:
              raise SystemExit(f'Could not load native extension from {candidates[0]}')

          module = util.module_from_spec(spec)
          spec.loader.exec_module(module)

          expected = ('TransportCrypto', 'AV1Depacketizer')
          missing = [name for name in expected if not hasattr(module, name)]
          if missing:
              raise SystemExit(f'Missing native exports: {missing}')

  docs:
    name: Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install documentation dependencies
        run: python -m pip install --upgrade pip -r docs/requirements.txt

      - name: Build documentation
        run: sphinx-build -b html -D language=en -j auto -n -T --keep-going docs docs/_build/html
