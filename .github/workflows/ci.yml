name: CI

on:
  push:
  pull_request:
    types: [ opened, synchronize ]
  workflow_dispatch:

# Runs do not need to be concurrent
concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
  checks:
    name: Source checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # TODO: install from pypi once published
          python -m pip install --upgrade ruff==0.12.0 "discord.py-self[voice] @ git+https://github.com/dolfies/discord.py-self"

      - name: Check Ruff
        run: ruff check .

      - name: Check Pyright
        run: npx --yes pyright@1.1.410

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Check Rust crate
        run: cargo check

  docs:
    name: Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: docs/requirements.txt

      - name: Install documentation dependencies
        run: python -m pip install --upgrade pip -r docs/requirements.txt

      - name: Build documentation
        run: sphinx-build -b html -D language=en -j auto -n -T --keep-going docs docs/_build/html
